<!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom ">
        <div class="container-fluid d-flex align-items-center justify-content-between">   
            <!-- Logo -->
            <a class="navbar-brand px-1 navLogo hover" href="#">LOGO</a>
            
            <!-- Search Bar and Menu -->
            <div class="search-container d-flex align-items-center bg-white flex-grow-1 me-4 position-relative">
                <input type="text" class="search-box flex-grow-1" placeholder="">
                <span class="search-icon position-absolute"><i class="bi bi-search"></i></span>
            </div>
            
            <!-- Button -->
            <button class="hamburger btn-primary hover" 
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#target"
            data-bs-display="static">
            <i class="bi bi-list text-white fs-1"></i>
            </button> 

            <!-- For Desktop and Laptop view -->
            <div class="DesktopView ">
                <a href="#" class="nav-link DesktopView hover">MENU</a>
            </div> 
            <div class="gap-4 mx-4 DesktopView">
                <a class="nav-link d-flex align-items-center" href="#">
                    <i class="bi bi-person fs-4 hover"></i>
                </a>
            </div>
            <div class="DesktopView"><a class="nav-link hover" href="#">CART</a></div>
            </div>
        </div>
    </nav>    


<!-- Collapsible Menu -->
    <div class="navbox  d-flex align-content-center justify-content-center" >
        <div class="d-grid p-1 collapse contentDisplay" id="target">
            <div class="itembox"><a href="#" class="nav-link contentDisplay m-3 item ">MENU</a> <hr> </div>
            <div class="itembox"><a href="#">
               <i class="bi bi-person nav-link fs-4 contentDisplay m-3 item"></i></a><hr>
            </div>
            <div class="itembox"><a class="nav-link contentDisplay m-3 item" href="#">CART</a></div>
        </div>
    </div>

<!-- Menu Head - Filter and sort and Menu -->
    <div class="header position-relative d-flex align-items-center my-4">
        <div class="filter d-flex gap-3 px-3 ">
            <div class="d-grid align-items-center align-content-center">
                <a href="#" class="filterImg"><i class="bi bi-funnel dark ps-2"></i></a>
                <div class="filter">Filter</div>
            </div>
            <div class="d-grid">
                <a href="#">
                    <img src="./sort.png" alt="sort" class="sort ps-1">
                </a> 
                <div class="filter mt-1">Sort</div>
            </div>
        </div>    

        <!-- Moves MENU 50% from the left of the parent (.header). & Moves it back by 50% of its own width -->

        <div class="heading position-absolute start-50 translate-middle-x fs-4"> 
            MENU
        </div>
    </div>
